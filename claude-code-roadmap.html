    const stages = [
      {
        id: 1, title: "Discovery", subtitle: "",
        color: "#6FFFE9", darkColor: "#1B4332", icon: "◈", duration: "~1.5 hours",
        overview: [
          {
            title: "Large Language Models",
            content: 'You\'ve probably heard the term "AI" used to describe everything from chess programs to self-driving cars. The type of AI behind Claude is called a <b><a href="https://ig.ft.com/generative-ai/" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">Large Language Model</a></b>, or LLM.<br/><br/>Think of an LLM as someone who has <b>read every book in every library</b>, every Wikipedia article, millions of conversations, and mountains of code. It didn\'t memorize all of it word-for-word — instead, it learned <b>patterns</b>. How sentences are structured. How ideas connect. How code works. How to reason through a problem step by step.<br/><br/>When you ask an LLM a question, it isn\'t searching a database for the answer. It\'s <b>generating</b> a response — writing it word by word, choosing each word based on everything it\'s learned about language and reasoning. This is why it can write an essay it\'s never seen before, explain a concept in a new way, or write code for a problem nobody has solved exactly that way.<br/><br/>This ability to <b>reason and generate</b> — rather than just look things up — is what makes everything else in this course possible.<br/><br/>One important caveat: because an LLM <b>generates</b> text rather than looking up facts, it can sound confident even when it\'s wrong. Generating ≠ knowing. It may produce plausible-sounding answers that are inaccurate, or cite sources that don\'t exist. This isn\'t a bug — it\'s how the technology works. Building the habit of <b>verifying important output</b> is a skill you\'ll develop throughout this course.<br/><br/>But an LLM on its own just talks. What if it could <b>take action</b>?',
          },
          {
            title: "Agentic AI",
            content: 'An LLM can reason, but on its own it\'s stuck behind a screen — it can only <b>talk</b>. Agentic AI is what happens when you give an LLM <b>tools</b>. Tools to read files, run commands, browse the web, call APIs. Instead of telling you what to do, it <b>does it</b> — breaking work into steps, executing each one, and checking its own results. When something goes wrong, it adjusts and tries again. All without you directing every move.<br/><br/>The key shift: you describe the <b>goal</b>, and the AI figures out the <b>how</b>.<br/><br/>This is what people mean by "agentic" — the AI has <b>agency</b>. It decides what to do next and actually does it. That\'s the concept. Let\'s meet the specific AI you\'ll be working with.',
          },
          {
            title: "Claude",
            content: '<a href="https://www.anthropic.com/claude" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">Claude</a> is <a href="https://www.anthropic.com" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">Anthropic\'s</a> LLM — and the brain behind everything in this course. You talk to it in plain English (or any language), and it talks back. Ask it to explain a concept, write an essay, analyze data, generate code, or brainstorm ideas. It\'s like having a <b>very knowledgeable colleague</b> available 24/7.<br/><br/>You can access Claude in three ways:<br/><b>Web</b> — through <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">claude.ai</a> (just open a browser and start chatting)<br/><b>Desktop</b> — through an <a href="https://claude.ai/download" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">app on your computer</a><br/><b>API</b> — which lets developers <a href="https://docs.anthropic.com/en/api/getting-started" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">build Claude into their own software</a><br/><br/>Claude comes in <b>three tiers</b>. <b>Opus</b> is the smartest — best for complex reasoning, but slower. <b>Sonnet</b> is the <b>default</b> everyday workhorse. <b>Haiku</b> is the fastest and cheapest — great for quick tasks. You can <a href="https://docs.anthropic.com/en/docs/about-claude/models" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">switch between them</a> anytime.<br/><br/>No matter which tier or interface, you\'re talking to the same Claude — a powerful <b>brain</b>. But a brain alone can only give advice. It can\'t touch your code. That changes with <b>Claude Code</b>.',
          },
          {
            title: "Claude Code",
            visual: "agenticLoop",
            content: 'Think of Claude as a <b>brilliant advisor sitting in a room with no doors</b>. You walk in, describe your problem, and get a thoughtful answer — but Claude can\'t leave the room. It can\'t look at your files, run your code, or make changes. You have to do all of that yourself and come back to report what happened.<br/><br/><a href="https://docs.anthropic.com/en/docs/claude-code/overview" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">Claude Code</a> <b>opens the doors</b>. It\'s a tool you run in your terminal that connects Claude directly to your project — giving the brain its tools. Now Claude can <b>read</b> and <b>edit</b> your files, <b>run</b> commands, <b>manage git</b>, and <b>connect</b> to services like GitHub.<br/><br/>With these tools, Claude Code runs the <b>agentic loop</b> — the pattern from card two, made concrete:',
            contentAfterVisual: 'You describe the goal. Claude Code figures out the how — <b>gathering</b> context from your files, <b>acting</b> by editing code and running commands, <b>verifying</b> the results, and <b>repeating</b> until the job is done. That\'s the LLM (the brain) + the tools (the hands) + the loop (the process) — all working together inside your codebase.<br/><br/>But the quality of what Claude does depends entirely on how you talk to it.',
          },
          {
            title: "Prompts",
            content: 'Every time you type something to Claude, you\'re writing a <b>prompt</b>. A prompt is just your input — the question, instruction, or request that tells Claude what you want. The better your prompt, the better Claude\'s response.<br/><br/>A good prompt is <b>specific</b>, gives <b>context</b>, and states what you <b>want back</b>. Compare these two:<br/><br/><span style="display: inline-block; padding: 6px 12px; background: #251820; border: 1px solid #3A2530; border-radius: 6px; margin: 4px 0; font-size: 13px;"><span style="color: #EF476F; opacity: 0.7; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;">Vague</span><br/><span style="color: #888;">"Help me plan a trip"</span></span><br/><span style="display: inline-block; padding: 6px 12px; background: #152520; border: 1px solid #254035; border-radius: 6px; margin: 4px 0; font-size: 13px;"><span style="color: #6FFFE9; opacity: 0.7; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;">Better</span><br/><span style="color: #D0CDC8;">"I\'m planning a 5-day trip to Tokyo in April with my partner. We like food, architecture, and avoiding tourist crowds. Budget is $200/day excluding flights. Build a day-by-day itinerary."</span></span><br/><br/>The second prompt works because Claude knows the <b>destination</b>, the <b>preferences</b>, and the <b>expected output</b>. You\'re not making it guess.<br/><br/>A few principles that go a long way:<br/><b>Be direct</b> — say exactly what you want, don\'t hint<br/><b>Give examples</b> — show Claude what good output looks like<br/><b>Set constraints</b> — "in under 200 words" or "no more than 5 bullet points"<br/><b>Iterate</b> — if the first response isn\'t right, tell Claude what to change<br/><br/>Prompting is a skill that improves with practice. For a deeper dive, explore the <a href="https://www.promptingguide.ai/" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">Prompt Engineering Guide</a> — it covers techniques from basic to advanced. But none of this matters if Claude doesn\'t have the right <b>context</b>.',
          },
          {
            title: "Context",
            content: 'Context is the information Claude has available when generating a response. Think of it like briefing a consultant before a meeting — the more relevant background you provide, the better their advice will be.<br/><br/>In a conversation, context includes:<br/><b>Your prompt</b> — what you just asked<br/><b>The conversation history</b> — everything said so far in this chat<br/><b>System instructions</b> — background rules set by the interface (like Projects)<br/><b>Attached files</b> — documents or code you\'ve uploaded<br/><br/>There\'s a limit to how much context Claude can hold at once — this is called the <b>context window</b>. Think of it like a desk: Claude can only work with what fits on the desk at one time. In a long conversation, earlier messages may fall off the edge.<br/><br/><b>Practical tip:</b> start a new conversation when you change topics. A long, wandering chat fills the desk with irrelevant context. A fresh conversation gives Claude a clean desk to work from.<br/><br/>This is why <b>Projects</b> in claude.ai matter. Without a Project, you\'d have to re-explain your preferences, upload the same files, and repeat the same instructions every time you start a new chat. When you create a Project and add instructions or files, that information stays available across every conversation in the project — it\'s always on the desk.<br/><br/>In Claude Code (which you\'ll use later), context management becomes even more important. Claude Code reads your files, runs commands, and builds context <b>automatically</b> — but understanding how context works now will help you write better prompts and know when to start a fresh conversation.',
          },
        ],
        items: [],
        keyResource: "code.claude.com/docs/en/overview",
        guide: {
          description: "",
          steps: [
            {
              title: 'Go to <a href="https://claude.ai" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">claude.ai</a> and create a free account (or sign in if you have one)',
              detail: 'Visit claude.ai and sign up with your email or Google account. The free tier gives you access to Claude with usage limits — more than enough for this level.<br/><br/><b>What you\'ll see:</b><br/>• A <b>chat input</b> at the bottom — this is where you type your prompts<br/>• A <b>model selector</b> to choose between Sonnet, Opus, and Haiku<br/>• A <b>sidebar</b> on the left with your conversation history and Projects<br/>That\'s it — no setup, no installation, no configuration. Just start typing.',
            },
            {
              title: "Start a conversation — ask Claude to explain something you're curious about",
              detail: 'Pick a topic you know well and one you don\'t. This lets you evaluate Claude\'s accuracy on familiar ground and its usefulness on new ground.<br/><br/><b>Try these prompts:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Explain how a car engine works in simple terms.</code><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">What are the main causes of inflation and how does it affect everyday life?</code><br/><br/>Notice how Claude asks clarifying questions or offers to go deeper. Try responding with "go deeper on the second point" or "explain that like I\'m 10 years old" to see how it adapts.<br/><br/>Remember: Claude is <b>generating</b> these responses, not looking them up. That\'s why checking its accuracy on topics you already know is so valuable.',
            },
            {
              title: 'Try <a href="https://www.promptingguide.ai/techniques" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">different prompt styles</a> and compare the responses',
              detail: 'Ask the same question three different ways and compare the results:<br/><br/><b>One-liner:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">How do I write a good cover letter?</code><br/><br/><b>Detailed paragraph:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">I\'m applying for a marketing position at a tech company. I have 3 years of experience in social media management and content creation. The job posting emphasizes data-driven marketing and cross-functional collaboration. Write a cover letter that highlights these strengths and keeps a professional but personable tone.</code><br/><br/><b>Bulleted request:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Write a cover letter. Details:<br/>- Role: Marketing Specialist at a tech company<br/>- My experience: 3 years social media + content creation<br/>- Emphasize: data-driven approach, cross-team collaboration<br/>- Tone: professional but personable<br/>- Length: under 300 words</code><br/><br/>Notice how more context and structure produces more useful responses. This is <b>prompting</b> in action — the same question, asked differently, gets very different results.',
            },
            {
              title: "Ask Claude to generate something: a story, recipe, code snippet, or email draft",
              detail: 'This is where you experience Claude as a creative partner, not just a Q&A bot.<br/><br/><b>Try these:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Write a professional email declining a meeting invitation. Tone: polite but firm. Keep it under 100 words.</code><br/><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Create a weekly meal plan for two people. Budget-friendly, mostly vegetarian, and each meal should take under 30 minutes. Include a grocery list.</code><br/><br/>After the first response, <b>iterate</b>: "Make it more casual" or "Swap Tuesday\'s dinner for something Thai" or "Now make it half the length." This is the core skill — using follow-ups to refine output.',
            },
            {
              title: 'Switch between <a href="https://platform.claude.com/docs/en/about-claude/models/overview" target="_blank" rel="noopener noreferrer" style="color: #6FFFE9; opacity: 0.8;">models</a> (Sonnet, Opus, Haiku) and observe the differences',
              detail: 'Use the model selector near the chat input to switch models. Try the same prompt on each:<br/><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Explain the pros and cons of remote work vs. in-office work. Include the perspective of both employees and employers.</code><br/><br/><b>What to notice:</b><br/>• <b>Haiku</b> responds almost instantly — shorter, more direct<br/>• <b>Sonnet</b> balances speed and depth — the sweet spot for most tasks<br/>• <b>Opus</b> takes longer but explores nuances and edge cases<br/><br/>There\'s no "best" model — the right choice depends on the task. Quick question? Haiku. Everyday work? Sonnet. Complex analysis? Opus.',
            },
            {
              title: "Use the Research feature to have Claude search the web and cite sources",
              detail: 'Toggle on the Research feature (look for the search icon or toggle in the input area). This lets Claude search the web and cite real sources.<br/><br/><b>Try this:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Research the current state of electric vehicle adoption worldwide. What are the leading markets, major manufacturers, and biggest barriers to adoption?</code><br/><br/>Check the citations Claude provides — click through to verify they\'re real and accurate. This builds the habit of <b>verifying output</b>, which is critical when working with any AI.',
            },
            {
              title: "Create a Project — give it instructions and upload a file, then ask questions about it",
              detail: 'Click "Projects" in the sidebar to create a new one. Projects let you set persistent instructions and upload reference files that Claude remembers across conversations.<br/><br/><b>Try this setup:</b><br/>1. Create a project called "Learning Assistant"<br/>2. In the project instructions, write:<br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">You are helping me learn new technical concepts. Always explain things simply first, then add complexity. Use analogies when possible. If I ask something you\'re not sure about, say so.</code><br/>3. Upload a document you\'re studying (a PDF, article, or notes)<br/>4. Start a conversation and ask questions about the uploaded content<br/><br/>Notice how Claude follows your instructions without you repeating them. This is <b>context</b> in action — persistent instructions keep information "on the desk" across conversations. It\'s a preview of how CLAUDE.md works in Claude Code.',
            },
          ],
          pitfalls: [
            {
              title: "Writing vague prompts — be specific about what you want and provide context",
              detail: '<b>Instead of:</b><br/><code style="color: #EF476F; opacity: 0.7; font-size: 12px;">Help me with my resume</code><br/><br/><b>Try:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">Review my resume for a marketing manager role. Focus on making the bullet points more impactful with specific metrics. Here\'s the current version:</code><br/><br/>The more Claude knows about your situation, the more useful its response.',
            },
            {
              title: "Accepting the first response without iterating — tell Claude what to change",
              detail: 'Claude\'s first response is a starting point, not the final answer. Treat it like a first draft:<br/><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">That\'s good but too formal. Make it more conversational and cut it in half.</code><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">The second paragraph is weak. Replace it with a concrete example.</code><br/><br/>Each follow-up gets you closer to what you actually need. Two or three rounds of refinement almost always beats starting over.',
            },
            {

              detail: 'Claude generates text based on patterns, not verified facts. It can:<br/>• Cite sources that don\'t exist<br/>• State incorrect statistics with complete confidence<br/>• Give outdated information<br/><br/>Build the habit: if you\'d fact-check a human colleague on it, fact-check Claude too. Use the <b>Research</b> feature to get cited sources, then click through to verify them.',
            },
            {
              title: "Treating it like a search engine — talk to Claude like a colleague, not a search bar",
              detail: '<b>Search engine style:</b><br/><code style="color: #EF476F; opacity: 0.7; font-size: 12px;">best way to learn Spanish</code><br/><br/><b>Conversation style:</b><br/><code style="color: #6FFFE9; opacity: 0.7; font-size: 12px;">I want to learn conversational Spanish for a trip to Mexico in 3 months. I\'m a complete beginner with about 30 minutes a day to practice. What\'s a realistic study plan?</code><br/><br/>Claude excels when you give it the full picture. Keywords get you a generic list; context gets you a tailored answer.',
            },
          ],
          checkpoint: "You're ready for Level 2 when you can have a productive back-and-forth conversation with Claude, know when to verify its output, and understand how context shapes its responses.",
        },
      },

    function AgenticLoop({ color }) {
      const [activeStep, setActiveStep] = useState(0);
      const steps = ["Gather", "Act", "Verify", "Repeat"];

      useEffect(() => {
        const interval = setInterval(() => {
          setActiveStep(prev => (prev + 1) % 4);
        }, 1500);
        return () => clearInterval(interval);
      }, []);

      return (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "center",
          gap: "0", margin: "20px 0 12px",
        }}>
          {steps.map((step, i) => (
            <React.Fragment key={step}>
              <span style={{
                fontSize: "12px", fontWeight: 600, letterSpacing: "0.5px",
                fontFamily: "'JetBrains Mono', monospace",
                color: activeStep === i ? color : "#777",
                opacity: activeStep === i ? 1 : 0.6,
                transition: "color 0.6s ease, opacity 0.6s ease",
                padding: "6px 10px",
                borderRadius: "6px",
                background: activeStep === i ? `${color}08` : "transparent",
              }}>
                {step}
              </span>
              {i < 3 ? (
                <span style={{
                  fontSize: "10px", color: "#555", margin: "0 2px",
                  fontFamily: "'JetBrains Mono', monospace",
                }}>→</span>
              ) : (
                <span style={{
                  fontSize: "10px", color: "#555", margin: "0 2px 0 4px",
                  fontFamily: "'JetBrains Mono', monospace",
                }}>↩</span>
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    function Collapsible({ isOpen, children }) {
      const contentRef = useRef(null);
      const [height, setHeight] = useState(0);

      useEffect(() => {
        if (contentRef.current) {
          setHeight(contentRef.current.scrollHeight);
        }
      }, [isOpen, children]);

      return (
        <div style={{
          maxHeight: isOpen ? height + "px" : "0px",
          opacity: isOpen ? 1 : 0,
          overflow: "hidden",
          transition: "max-height 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease",
        }}>
          <div ref={contentRef}>
            {children}
          </div>
        </div>
      );
    }

                                    </button>
                                  )}
                                </div>
                              </Collapsible>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {current.subtitle && (
                    <p style={{
                      fontSize: "14px", color: "#777", margin: "0 0 20px",
                      fontFamily: "'JetBrains Mono', monospace",
                    }}>
                      {current.subtitle}
                    </p>
                  )}

                  {/* Description */}
                  {current.guide.description && (
                    <p style={{
                      fontSize: "14px", color: "#BBB", lineHeight: 1.65,
                      fontFamily: "'JetBrains Mono', monospace",
                      marginBottom: "24px", maxWidth: "600px",
                    }}>
                      {current.guide.description}
                    </p>
                  )}

                  {/* Steps */}
                  <div style={{ marginBottom: "28px" }}>
                    <h3 style={{
                      fontSize: "13px", letterSpacing: "2px",
                      textTransform: "uppercase", color: current.color, opacity: 0.6,
                      marginBottom: "12px",
                    }}>
                      What to do
                    </h3>
                    <div style={{ position: "relative" }}>
                      {/* Connecting line */}
                      <div style={{
                        position: "absolute", left: "8px", top: "20px", bottom: "20px",
                        width: "1px", background: `linear-gradient(to bottom, ${current.color}30, ${current.color}10)`,
                        pointerEvents: "none",
                      }} />
                      <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                        {current.guide.steps.map((step, j) => {
                          const stepKey = `${current.id}-${j}`;
                          const isDone = completedSteps[stepKey];
                          const isObject = typeof step === "object";
                          const stepTitle = isObject ? step.title : step;
                          const stepDetail = isObject ? step.detail : null;
                          const isExpanded = expandedStep === stepKey;
                          return (
                            <div key={j} style={{
                              background: "#1F1F1F",
                              borderRadius: "8px", border: "1px solid",
                              borderColor: isExpanded ? `${current.color}25` : "#2A2A2A",
                              animation: "fadeSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1)",
                              animationDelay: `${j * 50}ms`, animationFillMode: "both",
                              marginLeft: "16px",
                              opacity: isDone ? 0.5 : 1,
                              transition: "opacity 0.3s ease, border-color 0.3s ease",
                              overflow: "hidden",
                            }}>
                              <div style={{
                                display: "flex", alignItems: "flex-start", gap: "12px",
                                padding: "10px 14px",
                              }}>
                                <button
                                  onClick={(e) => { e.stopPropagation(); setCompletedSteps(prev => ({ ...prev, [stepKey]: !prev[stepKey] })); }}
                                  style={{
                                    width: "16px", height: "16px", borderRadius: "4px",
                                    border: `1.5px solid ${isDone ? current.color : current.color + "40"}`,
                                    background: isDone ? `${current.color}20` : "transparent",
                                    cursor: "pointer", flexShrink: 0, marginTop: "2px",
                                    display: "flex", alignItems: "center", justifyContent: "center",
                                    transition: "all 0.2s ease", padding: 0,
                                  }}
                                >
                                  {isDone && (
                                    <span style={{ fontSize: "10px", color: current.color, lineHeight: 1 }}>✓</span>
                                  )}
                                </button>
                                <span
                                  onClick={() => stepDetail && setExpandedStep(isExpanded ? null : stepKey)}
                                  style={{
                                    fontSize: "14px", lineHeight: 1.5, color: "#D0CDC8",
                                    fontFamily: "'JetBrains Mono', monospace",
                                    textDecoration: isDone ? "line-through" : "none",
                                    textDecorationColor: isDone ? "#777" : "transparent",
                                    cursor: stepDetail ? "pointer" : "default",
                                    flex: 1,
                                  }}
                                  dangerouslySetInnerHTML={{ __html: stepTitle }}
                                />
                                {stepDetail && (
                                  <span
                                    onClick={() => setExpandedStep(isExpanded ? null : stepKey)}
                                    style={{
                                      fontSize: "11px", color: current.color,
                                      transition: "transform 0.3s ease",
                                      transform: isExpanded ? "rotate(90deg)" : "rotate(0)",
                                      flexShrink: 0, opacity: 0.4,
                                      cursor: "pointer", marginTop: "4px",
                                    }}
                                  >
                                    ▸
                                  </span>
                                )}
                              </div>
                              {stepDetail && (
                                <Collapsible isOpen={isExpanded}>
                                  <div style={{ padding: "0 14px 14px 42px" }}>
                                    <p className="overview-card" style={{
                                      fontSize: "13px", lineHeight: 1.6, color: "#AAA",
                                      fontFamily: "'JetBrains Mono', monospace",
                                      margin: 0,
                                    }}
                                      dangerouslySetInnerHTML={{ __html: stepDetail }}
                                    />
                                  </div>
                                </Collapsible>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  {/* Pitfalls */}
                  <div style={{ marginBottom: "28px" }}>
                    <h3 style={{
                      fontSize: "13px", letterSpacing: "2px",
                      textTransform: "uppercase", color: "#EF476F",
                      marginBottom: "12px", opacity: 0.7,
                    }}>
                      Common pitfalls
                    </h3>
                    <div style={{ position: "relative" }}>
                      {/* Connecting line */}
                      <div style={{
                        position: "absolute", left: "8px", top: "20px", bottom: "20px",
                        width: "1px", background: "linear-gradient(to bottom, #EF476F30, #EF476F10)",
                        pointerEvents: "none",
                      }} />
                      <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                        {current.guide.pitfalls.map((pitfall, j) => {
                          const isPitfallObject = typeof pitfall === "object";
                          const pitfallTitle = isPitfallObject ? pitfall.title : pitfall;
                          const pitfallDetail = isPitfallObject ? pitfall.detail : null;
                          const pitfallKey = `${current.id}-pitfall-${j}`;
                          const isPitfallExpanded = expandedPitfall === pitfallKey;
                          return (
                            <div key={j} style={{
                              background: "#201215",
                              borderRadius: "8px", border: "1px solid",
                              borderColor: isPitfallExpanded ? "#EF476F25" : "#3A2225",
                              animation: "fadeSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1)",
                              animationDelay: `${(current.guide.steps.length + j) * 50}ms`,
                              animationFillMode: "both",
                              marginLeft: "16px",
                              overflow: "hidden",
                              transition: "border-color 0.3s ease",
                            }}>
                              <div style={{
                                display: "flex", alignItems: "flex-start", gap: "12px",
                                padding: "10px 14px",
                              }}>
                                <span style={{
                                  fontSize: "11px", color: "#EF476F",
                                  fontWeight: 600, opacity: 0.5,
                                  marginTop: "2px", flexShrink: 0,
                                  fontFamily: "'JetBrains Mono', monospace",
                                }}>
                                  {j + 1}.
                                </span>
                                <span
                                  onClick={() => pitfallDetail && setExpandedPitfall(isPitfallExpanded ? null : pitfallKey)}
                                  style={{
                                    fontSize: "14px", lineHeight: 1.5, color: "#D0CDC8",
                                    fontFamily: "'JetBrains Mono', monospace",
                                    cursor: pitfallDetail ? "pointer" : "default",
                                    flex: 1,
                                  }}
                                >
                                  {pitfallTitle}
                                </span>
                                {pitfallDetail && (
                                  <span
                                    onClick={() => setExpandedPitfall(isPitfallExpanded ? null : pitfallKey)}
                                    style={{
                                      fontSize: "11px", color: "#EF476F",
                                      transition: "transform 0.3s ease",
                                      transform: isPitfallExpanded ? "rotate(90deg)" : "rotate(0)",
                                      flexShrink: 0, opacity: 0.4,
                                      cursor: "pointer", marginTop: "4px",
                                    }}
                                  >
                                    ▸
                                  </span>
                                )}
                              </div>
                              {pitfallDetail && (
                                <Collapsible isOpen={isPitfallExpanded}>
                                  <div style={{ padding: "0 14px 14px 42px" }}>
                                    <p className="overview-card" style={{
                                      fontSize: "13px", lineHeight: 1.6, color: "#AAA",
                                      fontFamily: "'JetBrains Mono', monospace",
                                      margin: 0,
                                    }}
                                      dangerouslySetInnerHTML={{ __html: pitfallDetail }}
                                    />
                                  </div>
                                </Collapsible>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>

                  {/* Ready check */}
                  <div style={{
                    padding: "16px 18px", background: `${current.darkColor}40`,
                    borderRadius: "10px", border: `1px solid ${current.color}15`,
                  }}>
                    <h3 style={{
                      fontSize: "13px", letterSpacing: "2px",
                      textTransform: "uppercase", color: current.color,
                      marginBottom: "10px", opacity: 0.6,
                    }}>
                      Ready for next level?
                    </h3>
                    <p style={{
                      fontSize: "14px", lineHeight: 1.6, color: "#D0CDC8",
                      fontFamily: "'JetBrains Mono', monospace",
                      margin: 0,
                    }}>
                      {current.guide.checkpoint}
                    </p>
                    <a
                      href="https://platform.claude.com/docs/en/home"
                      target="_blank"
                      rel="noopener noreferrer"
                      style={{
                        display: "inline-flex", alignItems: "center", gap: "6px",
                        marginTop: "12px", fontSize: "12px",
                        color: current.color, opacity: 0.5,
                        textDecoration: "none",
                        fontFamily: "'JetBrains Mono', monospace",
                        transition: "opacity 0.2s ease",
                      }}
                      onMouseEnter={(e) => e.currentTarget.style.opacity = "0.8"}
                      onMouseLeave={(e) => e.currentTarget.style.opacity = "0.5"}
                    >
                      <span>→</span> Explore the official docs
                    </a>
                    {activeStage < stages.length - 1 && (
                      <div style={{ marginTop: "16px" }}>
                        <button
                          onClick={() => { setActiveStage(activeStage + 1); setExpandedOverview(null); }}
                          style={{
                            display: "inline-flex", alignItems: "center", gap: "8px",
                            padding: "10px 20px",
                          background: `${current.color}15`,
                          border: `1px solid ${current.color}30`,
                          borderRadius: "8px", cursor: "pointer",
                          fontSize: "13px", fontWeight: 600,
                          color: current.color,
                          fontFamily: "'JetBrains Mono', monospace",
                          transition: "all 0.2s ease",
                        }}
                        onMouseEnter={(e) => {
                          e.currentTarget.style.background = `${current.color}25`;
                          e.currentTarget.style.borderColor = `${current.color}50`;
                        }}
                        onMouseLeave={(e) => {
                          e.currentTarget.style.background = `${current.color}15`;
                          e.currentTarget.style.borderColor = `${current.color}30`;
                        }}
                      >
                          Continue to Level {stages[activeStage + 1].id}: {stages[activeStage + 1].title} <span>→</span>
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              ) : (
                /* No stage selected */
                <div style={{
                  display: "flex", flexDirection: "column",
                  justifyContent: "center", height: "100%",
                  animation: "fadeSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1)",
                }}>
                  <div style={{
                    fontSize: "11px", letterSpacing: "3px", textTransform: "uppercase",
                    color: "#555", marginBottom: "12px",
                  }}>
                    Getting Started
                  </div>
                  <h2 style={{
                    fontSize: "24px", fontWeight: 700, color: "#777",
                    fontFamily: "'JetBrains Mono', monospace",
                    letterSpacing: "-0.5px", margin: "0 0 12px",
                  }}>
                    Select a level to begin
                  </h2>
                  <p style={{
                    fontSize: "14px", color: "#666", lineHeight: 1.6,
                    fontFamily: "'JetBrains Mono', monospace",
                    maxWidth: "400px",
                  }}>
                    Each level builds on the previous one. Start with Level 1 to understand the fundamentals,
                    then progress through installation, daily workflows, integrations, automation, and mastery.
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* Bottom progress bar */}
          <div style={{
            position: "fixed", bottom: 0, left: 0, right: 0,
            height: "3px", background: "#1F1F1F", zIndex: 10,
          }}>
            <div style={{
              height: "100%",
              width: activeStage !== null ? `${((activeStage + 1) / stages.length) * 100}%` : "0%",
              background: current
                ? `linear-gradient(90deg, ${current.color}80, ${current.color})`
                : "#555",
              transition: "all 0.5s cubic-bezier(0.16, 1, 0.3, 1)",
              borderRadius: "0 2px 2px 0",
            }} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ClaudeCodeRoadmap />);
  </script>
</body>
</html>
